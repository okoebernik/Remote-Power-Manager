# Reverse-Proxy mit selbstsigniertem TLS-Zertifikat für reinen LAN-Betrieb
# (keine öffentliche Domain, kein Let's Encrypt).
#
# Ziel: Browser sprechen HTTPS mit nginx, nginx leitet intern per Klartext-HTTP
# an die Next.js-App weiter (127.0.0.1:3000). Dadurch bleibt das Session-Cookie
# aus der Browser-Sicht auf einer echten HTTPS-Verbindung, das `Secure`-Attribut
# (COOKIE_SECURE, siehe ../README.md) funktioniert also auch aus anderen
# Subnetzen — ohne dass COOKIE_SECURE=false gesetzt werden muss.
#
# Installation: Datei nach /etc/nginx/sites-available/remote-power-manager.conf
# kopieren, servername/Zertifikatspfade anpassen, dann:
#   sudo ln -s /etc/nginx/sites-available/remote-power-manager.conf \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Zertifikat erzeugen (einmalig, 10 Jahre gültig, IP + Hostname als SAN):
#   sudo mkdir -p /etc/nginx/ssl
#   sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/rpm.key -out /etc/nginx/ssl/rpm.crt \
#     -subj "/CN=rpm.local" \
#     -addext "subjectAltName=DNS:rpm.local,IP:192.168.1.10"
#
# Ohne öffentlich vertrauenswürdige CA zeigen Browser eine Zertifikatswarnung
# an, bis das Zertifikat (rpm.crt) auf den Clients manuell als vertrauens-
# würdig importiert wird. Das ist bei einer reinen LAN-Lösung normal.

server {
    listen 80;
    server_name rpm.local 192.168.1.10;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name rpm.local 192.168.1.10;

    ssl_certificate     /etc/nginx/ssl/rpm.crt;
    ssl_certificate_key /etc/nginx/ssl/rpm.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
